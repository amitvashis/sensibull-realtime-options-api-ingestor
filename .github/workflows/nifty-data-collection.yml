name: Nifty Data Collection

on:
  schedule:
    # 9:15 AM IST = 3:45 AM UTC (Mon-Fri)
    - cron: '45 3 * * 1-5'

  workflow_dispatch: # Allow manual trigger
permissions:
  contents: write
jobs:
  collect-nifty-data:
    runs-on: ubuntu-latest
    # 6h = 360 min (GitHub-hosted runner max)
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: realtime-data
        run: npm install

      - name: Run Nifty data collection (every 5 min)
        working-directory: realtime-data
        env:
          SENSIBULL_TIMEOUT_MS: '180000'
          SENSIBULL_MAX_RECONNECTS: '10'
        run: |
          node collect-historical.js \
            --symbols NIFTY \
            --interval-seconds 300 \
            --stale-stop-runs 3 \
            --to-csv

      - name: Commit and push data
        if: always()
        run: |
          git config user.name "amitvashis"
          git config user.email "aamitvashistha1997@gmail.com"
          git add -f realtime-data/scrapped_data/ realtime-data/csv_data/
          git diff --cached --quiet || git commit -m "data: NIFTY snapshot $(date -u +'%Y-%m-%d')"
          git push

      - name: Upload collected data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nifty-data-${{ github.run_id }}
          path: |
            realtime-data/scrapped_data/
            realtime-data/csv_data/
          retention-days: 30
